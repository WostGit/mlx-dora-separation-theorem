name: dora-benchmark-logit-distill

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache

      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit

      BENCH_MAX_NEW_TOKENS: "100"
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" numpy

      - name: Run Native MLX Logit Distillation
        run: |
          set -euxo pipefail
          mkdir -p scripts

          cat > scripts/logit_distill.py <<'PY'
          import os
          import mlx.core as mx
          import mlx.nn as nn
          from mlx_lm import load
          from mlx_lm.tuner.lora import Linear as LoRALinear

          # 1. Load Models
          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]

          print(f"[LOAD] Loading Teacher: {teacher_repo}")
          teacher_model, teacher_tok = load(teacher_repo)
          teacher_model.freeze()  # Keep teacher frozen

          print(f"[LOAD] Loading Student: {student_repo}")
          student_model, student_tok = load(student_repo)

          # 2. Apply DoRA/LoRA to Student manually
          # We swap standard linear layers with low-rank ones
          for name, layer in list(student_model.named_modules()):
              if "q_proj" in name or "v_proj" in name:
                  if isinstance(layer, nn.Linear):
                      parent_name = name.rsplit('.', 1)[0]
                      parent = student_model.get_submodule(parent_name)
                      # Apply a rank 8 LoRA
                      setattr(parent, name.split('.')[-1], LoRALinear.from_linear(layer, r=8))

          # 3. Define Loss Function (Cross-Entropy + KL Divergence)
          def distillation_loss(student_logits, teacher_logits, targets, temp=2.0, alpha=0.5):
              # Shift targets for standard causal LM next-token prediction
              student_logits = student_logits[:, :-1, :]
              teacher_logits = teacher_logits[:, :-1, :]
              targets = targets[:, 1:]

              # Hard loss (Standard SFT)
              ce_loss = nn.losses.cross_entropy(student_logits, targets, reduction="mean")

              # Soft loss (Logit Distillation)
              # Normalize probability distribution with a high temperature
              p_teacher = mx.softmax(teacher_logits / temp, axis=-1)
              p_student = mx.log_softmax(student_logits / temp, axis=-1)
              
              # Compute KL Divergence
              kl_loss = -mx.sum(p_teacher * p_student, axis=-1).mean() * (temp ** 2)

              return (alpha * ce_loss) + ((1 - alpha) * kl_loss)

          # 4. Custom Training Loop
          optimizer = mx.optimizers.Adam(learning_rate=1e-5)
          prompts = [
              "Fix an off-by-one bug in Python binary search.",
              "If 5 workers finish a job in 12 days, how many days for 8 workers?",
              "Implement breadth-first search in Python."
          ]

          # Pre-tokenize all prompts using the student tokenizer
          encoded_prompts = [mx.array([student_tok.encode(p)]) for p in prompts]

          print("\n>>> STARTING CUSTOM LOGIT DISTILLATION LOOP")
          for epoch in range(10):
              total_loss = 0.0
              for i, input_ids in enumerate(encoded_prompts):
                  # Forward pass with gradients enabled for the student's LoRA params
                  def loss_fn(model):
                      # MLX models typically return both logits and a state tuple
                      s_logits, _ = model(input_ids)
                      # Teachers are frozen, so its forward pass is no_grad by default
                      t_logits, _ = teacher_model(input_ids)
                      return distillation_loss(s_logits, t_logits, input_ids)

                  # Compute loss and gradients
                  loss_grad_fn = mx.value_and_grad(student_model, loss_fn)
                  loss, grads = loss_grad_fn(student_model)

                  # Update weights
                  optimizer.update(student_model, grads)
                  mx.eval(student_model.state, loss)  # Trigger lazy evaluation

                  total_loss += loss.item()

              print(f"Epoch {epoch+1} | Mean Loss: {total_loss / len(prompts):.4f}")

          print("\nWorkflow successful. Soft alignment completed without external files.")
          PY

          "${VENV_DIR}/bin/python" scripts/logit_distill.py
