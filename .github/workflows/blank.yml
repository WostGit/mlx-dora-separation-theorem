name: dora-benchmark-first-ultra-verbose

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache

      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit

      DATA_ROOT: ${{ github.workspace }}/distill_runs
      BENCH_DIR: ${{ github.workspace }}/distill_runs/bench
      STRATEGY_ROOT: ${{ github.workspace }}/distill_runs/strategies

      MAX_NEW_TOKENS: "100"
      BENCH_MAX_NEW_TOKENS: "80"
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" numpy

      - name: Stage 1 - Run Verbose Teacher-Student Gap Analysis
        run: |
          set -euxo pipefail
          mkdir -p scripts "${BENCH_DIR}"

          cat > scripts/stage1_benchmark.py <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          from mlx_lm import load, generate

          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]
          max_new_tokens = int(os.environ.get("BENCH_MAX_NEW_TOKENS", "80"))

          print("\n[LOAD] Teacher:", teacher_repo)
          teacher_model, teacher_tok = load(teacher_repo)

          print("[LOAD] Student:", student_repo)
          student_model, student_tok = load(student_repo)

          def promptify(tok, user_text: str) -> str:
              msgs = [{"role": "system", "content": "You are a precise assistant. Answer directly."},
                      {"role": "user", "content": user_text}]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          suites = {
              "code_fix": ["Fix an off-by-one bug in Python binary search."],
              "code_gen": ["Implement breadth-first search in Python."],
              "reasoning": ["If 5 workers finish a job in 12 days, how many days for 8 workers?"],
              "structured_output": ["Return a JSON object with keys status and timeout_ms."],
              "robustness": ["Write a safe divide(a,b) function in Python handling zero."]
          }

          records = []
          for suite_name, prompts in suites.items():
              for prompt in prompts:
                  print(f"\nPrompting: {prompt}")
                  
                  # Set verbose=True to force printing tokens straight to terminal
                  print("\n>>> TEACHER GENERATION:")
                  teacher_ans = generate(teacher_model, teacher_tok, prompt=promptify(teacher_tok, prompt), 
                                         max_tokens=max_new_tokens, verbose=True).strip()
                  
                  print("\n>>> STUDENT GENERATION:")
                  student_ans = generate(student_model, student_tok, prompt=promptify(student_tok, prompt), 
                                         max_tokens=max_new_tokens, verbose=True).strip()

                  records.append({"prompt": prompt, "teacher": teacher_ans})

          # Save lines directly for Stage 2
          bench_dir = Path(os.environ["BENCH_DIR"])
          bench_dir.mkdir(parents=True, exist_ok=True)
          with (bench_dir / "minimal_train.jsonl").open("w") as f:
              for r in records:
                  f.write(json.dumps(r) + "\n")
          PY

          "${VENV_DIR}/bin/python" scripts/stage1_benchmark.py

      - name: Stage 2 - Run Real-Time DoRA Training & Evaluation
        run: |
          set -euxo pipefail
          export PATH="${VENV_DIR}/bin:$PATH"

          # 1. Prepare raw data directly into the folder
          mkdir -p "${STRATEGY_ROOT}/dora_run"
          
          # Multiply data so test doesn't crash on batch limits
          python -c "
          import json, os
          with open('$BENCH_DIR/minimal_train.jsonl') as f:
              lines = [line.strip() for line in f if line.strip()]
          padded = lines * 4
          for filename in ['train.jsonl', 'valid.jsonl', 'test.jsonl']:
              with open(f'$STRATEGY_ROOT/dora_run/{filename}', 'w') as out:
                  out.write('\n'.join(padded) + '\n')
          "

          # 2. Baseline test
          echo "########################################################################"
          echo "STAGE 2: BASELINE EVALUATION"
          echo "########################################################################"
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --data "${STRATEGY_ROOT}/dora_run" \
            --adapter-path "" \
            --batch-size 1 \
            --test

          # 3. Training
          echo "########################################################################"
          echo "STAGE 2: DORA ADAPTATION TRAINING"
          echo "########################################################################"
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --train \
            --data "${STRATEGY_ROOT}/dora_run" \
            --adapter-path "${STRATEGY_ROOT}/dora_run/adapters" \
            --fine-tune-type dora \
            --iters 40 \
            --batch-size 1 \
            --num-layers 4 \
            --learning-rate 1e-5 \
            --mask-prompt

          # 4. Final test
          echo "########################################################################"
          echo "STAGE 2: FINAL ADAPTED EVALUATION"
          echo "########################################################################"
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --adapter-path "${STRATEGY_ROOT}/dora_run/adapters" \
            --data "${STRATEGY_ROOT}/dora_run" \
            --batch-size 1 \
            --test

          echo "Workflow finished. Check console above for all evaluation results."
