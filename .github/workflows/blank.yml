name: dora-separation-theorem

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: 1
      HF_HOME: ${{ github.workspace }}/.hf-cache
      HF_HUB_ENABLE_HF_TRANSFER: 1
      MODEL_ID: Qwen/Qwen2-0.5B

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # STEP 1: SETUP
      ############################################################
      - name: Install deps
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install mlx mlx-lm numpy

      ############################################################
      # STEP 2: BUILD TINY AGENTIC DATASET
      ############################################################
      - name: Create dataset (issue → patch)
        run: |
          set -euxo pipefail
          mkdir -p data/base

          cat > data/base/train.jsonl <<'JSON'
          {"prompt":"Fix bug: function returns wrong sum\n\n### file: math.py\n\ndef add(a,b):\n    return a-b\n\nTask: fix","completion":"diff --git a/math.py b/math.py\n@@\n- return a-b\n+ return a+b"}
          {"prompt":"Fix bug: string reverse broken\n\n### file: util.py\n\ndef rev(s):\n    return s\n\nTask: fix","completion":"diff --git a/util.py b/util.py\n@@\n- return s\n+ return s[::-1]"}
          {"prompt":"Fix bug: multiply wrong\n\n### file: mul.py\n\ndef mul(a,b):\n    return a+b\n\nTask: fix","completion":"diff --git a/mul.py b/mul.py\n@@\n- return a+b\n+ return a*b"}
          JSON

          cp data/base/train.jsonl data/base/valid.jsonl

      ############################################################
      # STEP 3: GENERATE INTERFACE DATA (CRITICAL)
      ############################################################
      - name: Generate argmax/topk/probs datasets
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os, json
          import mlx.core as mx
          from mlx_lm import load

          model, tokenizer = load(os.environ["MODEL_ID"])

          def tok(x):
              return tokenizer.encode(x)

          def get_probs(prompt):
              ids = tok(prompt)
              x = mx.array([ids], dtype=mx.int32)
              logits = model(x)
              logits = logits[0, -1, :]
              probs = mx.softmax(logits)
              return probs.astype(mx.float32)

          base = []
          with open("data/base/train.jsonl") as f:
              for line in f:
                  base.append(json.loads(line))

          os.makedirs("data/argmax", exist_ok=True)
          os.makedirs("data/topk", exist_ok=True)
          os.makedirs("data/probs", exist_ok=True)

          def write(path, rows):
              with open(path, "w") as f:
                  for r in rows:
                      f.write(json.dumps(r) + "\n")

          argmax_rows, topk_rows, probs_rows = [], [], []

          for row in base:
              p = get_probs(row["prompt"])

              # argmax
              idx = int(mx.argmax(p).item())
              argmax_rows.append({
                  "prompt": row["prompt"],
                  "completion": str(idx)
              })

              # topk
              k = 5
              idxs = mx.argsort(p)[-k:][::-1]
              vals = mx.take(p, idxs)
              vals = vals / mx.sum(vals)
              topk_rows.append({
                  "prompt": row["prompt"],
                  "completion": ",".join(map(str, idxs.tolist()))
              })

              # probs (dense truncated)
              topk = 20
              idxs = mx.argsort(p)[-topk:][::-1]
              vals = mx.take(p, idxs)
              vals = vals / mx.sum(vals)
              probs_rows.append({
                  "prompt": row["prompt"],
                  "completion": json.dumps({
                      "ids": idxs.tolist(),
                      "probs": [float(x) for x in vals.tolist()]
                  })
              })

          write("data/argmax/train.jsonl", argmax_rows)
          write("data/topk/train.jsonl", topk_rows)
          write("data/probs/train.jsonl", probs_rows)

          write("data/argmax/valid.jsonl", argmax_rows)
          write("data/topk/valid.jsonl", topk_rows)
          write("data/probs/valid.jsonl", probs_rows)

          print("DATASETS BUILT")
          PY

      ############################################################
      # STEP 4: TRAIN 3 DORA STUDENTS
      ############################################################
      - name: Train argmax student
        run: |
          python -m mlx_lm.lora \
            --model $MODEL_ID \
            --train \
            --data data/argmax \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 80 \
            --steps-per-report 1 \
            --save-every 40

      - name: Train topk student
        run: |
          python -m mlx_lm.lora \
            --model $MODEL_ID \
            --train \
            --data data/topk \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 80 \
            --steps-per-report 1 \
            --save-every 40

      - name: Train probs student
        run: |
          python -m mlx_lm.lora \
            --model $MODEL_ID \
            --train \
            --data data/probs \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 80 \
            --steps-per-report 1 \
            --save-every 40

      ############################################################
      # STEP 5: EVALUATE SEPARATION THEOREM
      ############################################################
      - name: Evaluate KL vs agreement
        run: |
          python - <<'PY'
          import mlx.core as mx
          from mlx_lm import load

          model, tokenizer = load("Qwen/Qwen2-0.5B")

          prompts = [
              "Fix sum bug",
              "Reverse string",
              "Multiply numbers",
              "Fix division",
          ]

          def get_probs(m, tok, prompt):
              ids = tok.encode(prompt)
              x = mx.array([ids], dtype=mx.int32)
              logits = m(x)[0, -1, :]
              return mx.softmax(logits).astype(mx.float32)

          victim = model

          students = {
              "argmax": model,
              "topk": model,
              "probs": model,
          }

          print("\n===== SEPARATION TEST =====\n")

          for name, student in students.items():
              agreements = []
              kls = []

              for p in prompts:
                  v = get_probs(victim, tokenizer, p)
                  s = get_probs(student, tokenizer, p)

                  vt = int(mx.argmax(v).item())
                  st = int(mx.argmax(s).item())

                  agreements.append(int(vt == st))

                  kl = float(mx.sum(v * mx.log(v / s)).item())
                  kls.append(kl)

              print(f"\nINTERFACE = {name}")
              print("MEAN_AGREEMENT =", sum(agreements)/len(agreements))
              print("MEAN_KL =", sum(kls)/len(kls))

          print("\nEXPECTED RESULT:")
          print("Agreement ~ similar")
          print("KL: probs < topk < argmax")
          PY

      ############################################################
      # DONE
      ############################################################
      - name: Done
        run: echo "SEPARATION THEOREM TEST COMPLETE"
