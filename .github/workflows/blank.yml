name: dora-separation-theorem-ultra-verbose

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      MODEL_ID: Qwen/Qwen2-0.5B
      HF_HOME: ${{ github.workspace }}/.hf-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Info
        run: |
          echo "================ SYSTEM INFO ================"
          uname -a
          python --version
          echo "============================================="

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install mlx mlx_lm

      - name: Run Separation Theorem (REAL DISTILLATION)
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          import sys
          import random
          import platform
          import mlx.core as mx
          from mlx_lm import load

          random.seed(0)

          print("\n============================================================")
          print("STEP 1: ENV + MODEL LOAD")
          print("============================================================")

          print("PYTHON =", sys.version)
          print("PLATFORM =", platform.platform())
          print("MODEL_ID =", os.environ.get("MODEL_ID"))
          print("HF_HOME =", os.environ.get("HF_HOME"))

          model, tokenizer = load(os.environ.get("MODEL_ID"))

          print("MODEL_LOADED =", type(model).__name__)
          print("TOKENIZER_LOADED =", type(tokenizer).__name__)

          def tokenize(text):
              ids = tokenizer.encode(text)
              if ids and isinstance(ids[0], list):
                  ids = ids[0]
              assert all(isinstance(x, int) for x in ids)
              return ids

          def forward_probs(prompt):
              ids = tokenize(prompt)
              x = mx.array([ids], dtype=mx.int32)
              logits = model(x)[0, -1, :]
              probs = mx.softmax(logits).astype(mx.float32)

              print("\n[FORWARD PASS]")
              print("PROMPT =", repr(prompt))
              print("TOKEN_LEN =", len(ids))
              print("VOCAB_SIZE =", probs.shape[0])
              print("PROB_SUM =", float(mx.sum(probs).item()))

              return probs

          prompts = [
              "Fix bug: def add(a,b): return a-b",
              "Reverse string in Python",
              "Multiply two numbers function",
              "Fix division by zero",
              "Sort a list ascending",
          ]

          print("\n============================================================")
          print("STEP 2: BUILD DATASET (TRUE TARGETS)")
          print("============================================================")

          dataset = []
          vocab_size = None

          for p in prompts:
              v = forward_probs(p)

              if vocab_size is None:
                  vocab_size = v.shape[0]

              argmax_target = mx.zeros_like(v)
              top1 = int(mx.argmax(v).item())
              argmax_target[top1] = 1.0

              k = 5
              topk_ids = mx.argsort(v)[-k:]
              topk_vals = v[topk_ids]
              topk_vals = topk_vals / mx.sum(topk_vals)

              topk_target = mx.zeros_like(v)
              topk_target[topk_ids] = topk_vals

              probs_target = v

              print("\n[DATA POINT]")
              print("PROMPT =", p)
              print("TOP1_ID =", top1)
              print("TOPK_IDS =", [int(x) for x in topk_ids.tolist()])

              dataset.append((p, argmax_target, topk_target, probs_target))

          print("DATASET_SIZE =", len(dataset))
          print("VOCAB_SIZE =", vocab_size)

          print("\n============================================================")
          print("STEP 3: STUDENT DEFINITION")
          print("============================================================")

          class Student:
              def __init__(self, name):
                  self.name = name
                  self.logits = mx.zeros(vocab_size)

              def probs(self):
                  return mx.softmax(self.logits)

              def update(self, grad, lr=0.5):
                  self.logits = self.logits - lr * grad

          def kl(p, q, eps=1e-12):
              p = mx.maximum(p, eps)
              q = mx.maximum(q, eps)
              return float(mx.sum(p * mx.log(p / q)).item())

          def kl_grad(student_probs, target_probs):
              return student_probs - target_probs

          students = {
              "argmax": Student("argmax"),
              "topk": Student("topk"),
              "probs": Student("probs"),
          }

          print("STUDENTS =", list(students.keys()))

          print("\n============================================================")
          print("STEP 4: TRAINING LOOP")
          print("============================================================")

          epochs = 200

          for epoch in range(epochs):
              epoch_loss = {k: 0.0 for k in students}

              for prompt, a_t, t_t, p_t in dataset:
                  for name, student in students.items():
                      sp = student.probs()

                      if name == "argmax":
                          target = a_t
                      elif name == "topk":
                          target = t_t
                      else:
                          target = p_t

                      loss = kl(target, sp)
                      grad = kl_grad(sp, target)

                      student.update(grad, lr=0.5)
                      epoch_loss[name] += loss

              if epoch % 50 == 0 or epoch == epochs - 1:
                  print("\n[EPOCH SUMMARY]", epoch)
                  for name in students:
                      print(f"{name}_LOSS =", epoch_loss[name])

          print("\n============================================================")
          print("STEP 5: FINAL EVALUATION")
          print("============================================================")

          for name, student in students.items():
              agreements = []
              kls = []

              for prompt, a_t, t_t, p_t in dataset:
                  victim = p_t
                  student_probs = student.probs()

                  vt = int(mx.argmax(victim).item())
                  st = int(mx.argmax(student_probs).item())

                  agreements.append(int(vt == st))
                  kls.append(kl(victim, student_probs))

              print("\n==============================")
              print("STUDENT =", name)
              print("==============================")
              print("MEAN_AGREEMENT =", sum(agreements) / len(agreements))
              print("MEAN_KL =", sum(kls) / len(kls))

          print("\n============================================================")
          print("EXPECTED RESULT (SEPARATION THEOREM)")
          print("============================================================")
          print("Agreement: all similar or high")
          print("KL ordering: probs < topk < argmax")
          print("============================================================")
          PY
