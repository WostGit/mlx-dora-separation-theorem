name: dora-benchmark-scaled-hard

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache

      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" numpy

      - name: Generate Hard Dataset & Scale Up
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/scaled_distill.py
          import json
          import os
          from pathlib import Path
          from mlx_lm import load, generate

          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]

          print(f"[LOAD] Loading Teacher: {teacher_repo}")
          teacher_model, teacher_tok = load(teacher_repo)

          print(f"[LOAD] Loading Student: {student_repo}")
          student_model, student_tok = load(student_repo)

          # Expanded, harder multi-step tasks
          tasks = [
              "Write a Python function to find the longest palindromic substring in a string.",
              "If 5 workers take 12 days to build 2 houses, how many days do 3 workers take to build 5 houses?",
              "Generate a valid JSON representing a binary tree node with left and right children.",
              "Explain the difference between a mutex and a semaphore with a quick Python analogy.",
              "Solve for x: 3x + 5 = 20."
          ]

          def promptify(tok, text, system="You are a brilliant assistant. Answer directly and precisely."):
              msgs = [{"role": "system", "content": system}, {"role": "user", "content": text}]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          training_data = []

          print("\n>>> PROBING STUDENT ON HARD TASKS")
          for task in tasks:
              print(f"\nTask: {task}")
              
              # Get Teacher's golden response
              ground_truth = generate(teacher_model, teacher_tok, prompt=promptify(teacher_tok, task), max_tokens=200).strip()
              
              # Get Student's attempt
              student_attempt = generate(student_model, student_tok, prompt=promptify(student_tok, task), max_tokens=200).strip()
              
              # Teacher evaluates student
              judge_prompt = (
                  f"Task: {task}\n\n"
                  f"Target Solution:\n{ground_truth}\n\n"
                  f"Student Attempt:\n{student_attempt}\n\n"
                  f"Does the student match the core logic of the target? Reply EXACTLY with 'YES' or 'NO' followed by a short reason."
              )
              
              judgment = generate(teacher_model, teacher_tok, prompt=promptify(teacher_tok, judge_prompt), max_tokens=60).strip()
              print(f"Verdict: {judgment}")
              
              # Force learning on failures or edge cases
              if "NO" in judgment.upper() or len(training_data) < 3:
                  training_data.append({"prompt": task, "completion": ground_truth})

          # Scale the training dataset size by padding it up
          data_dir = Path(os.environ["GITHUB_WORKSPACE"]) / "distill_runs" / "dora_run"
          data_dir.mkdir(parents=True, exist_ok=True)
          
          padded_data = training_data * 10  # Creating a larger training pool
          
          for name in ["train.jsonl", "valid.jsonl", "test.jsonl"]:
              with open(data_dir / name, "w") as f:
                  for item in padded_data:
                      f.write(json.dumps(item) + "\n")
                      
          print(f"\nConstructed a scaled dataset with {len(padded_data)} total samples.")
          EOF

      - name: Run Scaled Distillation
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" scripts/scaled_distill.py

      - name: Scale Up DoRA Training
        run: |
          set -euxo pipefail
          export PATH="${VENV_DIR}/bin:$PATH"
          
          echo "########################################################################"
          echo "DORA TRAINING - SCALED ITERATIONS & HARD PROMPTS"
          echo "########################################################################"
          
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --train \
            --data "${GITHUB_WORKSPACE}/distill_runs/dora_run" \
            --adapter-path "${GITHUB_WORKSPACE}/distill_runs/dora_run/adapters" \
            --fine-tune-type dora \
            --iters 100 \
            --batch-size 1 \
            --num-layers 4 \
            --learning-rate 1e-5 \
            --mask-prompt
