name: dora-benchmark-self-correct

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache

      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" numpy

      - name: Create Competent Distillation Script
        run: |
          mkdir -p scripts
          # Using a proper delimiter to prevent the shell from eating our Python variables
          cat << 'EOF' > scripts/self_correct_distill.py
          import json
          import os
          from pathlib import Path
          from mlx_lm import load, generate

          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]

          print(f"[LOAD] Loading Teacher: {teacher_repo}")
          teacher_model, teacher_tok = load(teacher_repo)

          print(f"[LOAD] Loading Student: {student_repo}")
          student_model, student_tok = load(student_repo)

          # Prompts targeting edge cases
          tasks = [
              "Write a safe divide(a,b) function in Python handling zero.",
              "If 5 workers finish a job in 12 days, how many days for 8 workers?",
              "Generate a valid JSON object reporting system status 'green' and an array of 2 server IDs."
          ]

          def promptify(tok, text, system="You are a precise assistant."):
              msgs = [{"role": "system", "content": system}, {"role": "user", "content": text}]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          training_data = []

          print("\n>>> STARTING STRATEGIC ERROR MINING")
          for task in tasks:
              print(f"\nEvaluating Task: {task}")
              
              # 1. Ask Teacher for the ground truth
              print("Teacher constructing ideal solution...")
              ground_truth = generate(teacher_model, teacher_tok, prompt=promptify(teacher_tok, task), max_tokens=150).strip()
              
              # 2. Ask Student to attempt it
              print("Student attempting task...")
              student_attempt = generate(student_model, student_tok, prompt=promptify(student_tok, task), max_tokens=150).strip()
              
              # 3. Use Teacher as a Rubric Judge
              judge_prompt = (
                  f"Task: {task}\n\n"
                  f"Target Correct Solution: {ground_truth}\n\n"
                  f"Student's Attempt: {student_attempt}\n\n"
                  f"Does the Student's attempt conceptually match the ground truth? Answer with EXACTLY 'YES' or 'NO' first, then a 1-sentence reason."
              )
              
              print("Teacher judging student performance...")
              judgment = generate(teacher_model, teacher_tok, prompt=promptify(teacher_tok, judge_prompt), max_tokens=50).strip()
              print(f"Verdict: {judgment}")
              
              # If the student fails, we force it into the training pool.
              # If the student passes, we don't waste compute teaching it what it already knows!
              if "NO" in judgment.upper() or len(training_data) < 2:
                  print("-> Action: Student failed or pool too small. Adding target to training queue.")
                  training_data.append({"prompt": task, "completion": ground_truth})
              else:
                  print("-> Action: Student succeeded. Skipping training for this prompt.")

          # Save the extracted weak-spot dataset
          data_dir = Path(os.environ["GITHUB_WORKSPACE"]) / "distill_runs" / "dora_run"
          data_dir.mkdir(parents=True, exist_ok=True)
          
          # Pad out slightly so test commands don't complain about data size
          padded_data = training_data * 5
          for name in ["train.jsonl", "valid.jsonl", "test.jsonl"]:
              with open(data_dir / name, "w") as f:
                  for item in padded_data:
                      f.write(json.dumps(item) + "\n")
                      
          print(f"\nSetup complete. Generated focused dataset with {len(training_data)} unique correction samples.")
          EOF

      - name: Run Self-Correcting Distillation
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" scripts/self_correct_distill.py

      - name: Fine-tune Student on Extracted Failures
        run: |
          set -euxo pipefail
          export PATH="${VENV_DIR}/bin:$PATH"
          
          echo "########################################################################"
          echo "DORA TRAINING ON STUDENT WEAK SPOTS"
          echo "########################################################################"
          
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --train \
            --data "${GITHUB_WORKSPACE}/distill_runs/dora_run" \
            --adapter-path "${GITHUB_WORKSPACE}/distill_runs/dora_run/adapters" \
            --fine-tune-type dora \
            --iters 30 \
            --batch-size 1 \
            --num-layers 4 \
            --learning-rate 1e-5 \
            --mask-prompt
