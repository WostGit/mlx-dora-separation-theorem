name: dora-benchmark-first-ultra-verbose

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache

      # Open/local simulation only.
      # Public Qwen benchmarks show a real size gap between these classes of models,
      # especially on coding / reasoning tasks; this workflow benchmarks locally first.
      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit

      DATA_ROOT: ${{ github.workspace }}/distill_runs
      BENCH_DIR: ${{ github.workspace }}/distill_runs/bench
      STRATEGY_ROOT: ${{ github.workspace }}/distill_runs/strategies
      SUMMARY_DIR: ${{ github.workspace }}/distill_runs/summary

      MAX_NEW_TOKENS: "220"
      BENCH_MAX_NEW_TOKENS: "180"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Info
        run: |
          echo "================ SYSTEM INFO ================"
          uname -a
          sw_vers || true
          python3 --version
          echo "WORKSPACE = $GITHUB_WORKSPACE"
          echo "HF_HOME   = $HF_HOME"
          echo "TEACHER   = $TEACHER_MODEL"
          echo "STUDENT   = $STUDENT_MODEL"
          echo "============================================="

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install "mlx-lm[train]" numpy

      - name: Stage 1 - Build benchmark suite and run ultra verbose teacher-student gap analysis
        run: |
          set -euxo pipefail
          mkdir -p scripts "${BENCH_DIR}" "${SUMMARY_DIR}"

          cat > scripts/stage1_benchmark.py <<'PY'
          import json
          import os
          import random
          import re
          from pathlib import Path
          from collections import defaultdict

          from mlx_lm import load, generate

          random.seed(0)

          bench_dir = Path(os.environ["BENCH_DIR"])
          summary_dir = Path(os.environ["SUMMARY_DIR"])
          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]
          max_new_tokens = int(os.environ.get("BENCH_MAX_NEW_TOKENS", "180"))

          print("=" * 80)
          print("STAGE 1: BENCHMARK FIRST")
          print("=" * 80)
          print("This stage measures the teacher-student gap before any distillation.")
          print("It uses local/open models only.")
          print("It logs results very verbosely so you can see what is working and what is broken.")
          print("=" * 80)

          print("\n[LOAD] Teacher:", teacher_repo)
          teacher_model, teacher_tok = load(teacher_repo)

          print("[LOAD] Student:", student_repo)
          student_model, student_tok = load(student_repo)

          def promptify(tok, user_text: str, style: str) -> str:
              if style == "direct":
                  system = (
                      "You are a precise assistant. "
                      "Answer directly. "
                      "For code tasks, give code first, then a short explanation."
                  )
              elif style == "edge_case":
                  system = (
                      "You are a careful assistant. "
                      "Prefer robust answers that mention pitfalls, edge cases, or caveats where useful."
                  )
              elif style == "agentic":
                  system = (
                      "You are a task-solving assistant. "
                      "Provide a concise, executable answer that would help a coding or operations workflow."
                  )
              else:
                  system = "You are a helpful assistant."

              msgs = [
                  {"role": "system", "content": system},
                  {"role": "user", "content": user_text},
              ]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          def answer(model, tok, user_text: str, style: str) -> str:
              return generate(
                  model,
                  tok,
                  prompt=promptify(tok, user_text, style),
                  max_tokens=max_new_tokens,
                  verbose=False,
              ).strip()

          def norm_tokens(s: str):
              return re.findall(r"[a-zA-Z0-9_]+", s.lower())

          def token_f1(a: str, b: str) -> float:
              aa = norm_tokens(a)
              bb = norm_tokens(b)
              if not aa or not bb:
                  return 0.0
              ca = {}
              cb = {}
              for t in aa:
                  ca[t] = ca.get(t, 0) + 1
              for t in bb:
                  cb[t] = cb.get(t, 0) + 1
              overlap = 0
              for t, c in ca.items():
                  overlap += min(c, cb.get(t, 0))
              if overlap == 0:
                  return 0.0
              precision = overlap / max(len(bb), 1)
              recall = overlap / max(len(aa), 1)
              return 2 * precision * recall / max(precision + recall, 1e-9)

          def contains_any(text: str, words) -> int:
              t = text.lower()
              return int(any(w.lower() in t for w in words))

          def backticks_count(text: str) -> int:
              return text.count("```")

          suites = {
              "code_fix": [
                  "Fix an off-by-one bug in Python binary search and include a tiny test.",
                  "A function does return a-b in add(a,b). Patch it and show the corrected code.",
                  "A sort routine fails when duplicate values are present. Provide a minimal fix.",
                  "A dict access raises KeyError for missing optional config. Show a safe patch.",
                  "A CSV parser breaks on quoted commas. Show a corrected Python approach.",
                  "A DFS implementation hits recursion depth on large graphs. Provide an iterative rewrite.",
              ],
              "code_gen": [
                  "Implement breadth-first search in Python and state time complexity.",
                  "Write a Python function to merge overlapping intervals.",
                  "Write a tiny CLI in Python that reads JSON from stdin and prints one selected field.",
                  "Implement a simple LRU cache in Python using built-in data structures.",
                  "Write a regex in Python that extracts IPv4 addresses and show a quick test.",
                  "Write a function that normalizes whitespace and strips control characters.",
              ],
              "reasoning": [
                  "If 5 workers finish a job in 12 days at the same rate, how many days for 8 workers? Show the final answer.",
                  "A shop offers 20 percent off and then 10 percent off the discounted price. What is the total discount from original price?",
                  "Find the next number in the sequence 2, 6, 12, 20, 30 and explain briefly.",
                  "A train travels 180 km in 2 hours. What is its average speed in km/h?",
                  "A rectangle has area 84 and width 7. What is its length?",
                  "If x + 3 = 11, solve for x and state the answer plainly.",
              ],
              "structured_output": [
                  "Return a JSON object with keys status, retry, timeout_ms for a resilient API client configuration.",
                  "Return YAML with fields service, owner, severity for an incident ticket.",
                  "Return a JSON array of three Python standard-library modules useful for parsing text.",
                  "Return a TOML snippet configuring an app name and debug=false.",
                  "Return a JSON object for a user with id=7, name=Ana, active=true.",
                  "Return CSV with header name,score and two rows: Alice 91, Bob 88.",
              ],
              "robustness": [
                  "Write a safe divide(a,b) function in Python. Handle zero division cleanly.",
                  "Refactor a quadratic duplicate-removal function into linear time and mention edge cases.",
                  "Propose retry logic with exponential backoff for flaky HTTP requests in Python.",
                  "Design a parser strategy for logs with malformed lines and mixed delimiters.",
                  "Show how to validate user input for an integer port number in Python.",
                  "Write code that reads a file and handles missing-file errors gracefully.",
              ],
          }

          styles = ["direct", "edge_case", "agentic"]

          records = []
          suite_summary = defaultdict(lambda: {"count": 0, "f1_sum": 0.0, "teacher_longer": 0, "student_empty": 0})

          for suite_name, prompts in suites.items():
              print("\n" + "#" * 80)
              print(f"[SUITE START] {suite_name}")
              print("#" * 80)

              for style in styles:
                  print(f"\n--- STYLE = {style} ---")
                  for idx, prompt in enumerate(prompts, start=1):
                      teacher = answer(teacher_model, teacher_tok, prompt, style)
                      student = answer(student_model, student_tok, prompt, style)
                      f1 = token_f1(teacher, student)

                      teacher_len = len(norm_tokens(teacher))
                      student_len = len(norm_tokens(student))

                      record = {
                          "suite": suite_name,
                          "style": style,
                          "id": f"{suite_name}-{style}-{idx:02d}",
                          "prompt": prompt,
                          "teacher": teacher,
                          "student": student,
                          "token_f1": round(f1, 4),
                          "teacher_token_len": teacher_len,
                          "student_token_len": student_len,
                          "teacher_has_code_block": backticks_count(teacher) >= 2,
                          "student_has_code_block": backticks_count(student) >= 2,
                          "teacher_mentions_edge_case": contains_any(teacher, ["edge case", "pitfall", "caveat", "handle", "error"]),
                          "student_mentions_edge_case": contains_any(student, ["edge case", "pitfall", "caveat", "handle", "error"]),
                      }
                      records.append(record)

                      suite_summary[suite_name]["count"] += 1
                      suite_summary[suite_name]["f1_sum"] += f1
                      suite_summary[suite_name]["teacher_longer"] += int(teacher_len > student_len)
                      suite_summary[suite_name]["student_empty"] += int(student_len == 0)

                      print("\n[CASE]")
                      print("ID                =", record["id"])
                      print("PROMPT            =", prompt)
                      print("TEACHER_LEN       =", teacher_len)
                      print("STUDENT_LEN       =", student_len)
                      print("TOKEN_F1          =", record["token_f1"])
                      print("TEACHER_CODEBLOCK =", record["teacher_has_code_block"])
                      print("STUDENT_CODEBLOCK =", record["student_has_code_block"])
                      print("TEACHER_EDGE      =", record["teacher_mentions_edge_case"])
                      print("STUDENT_EDGE      =", record["student_mentions_edge_case"])
                      print("TEACHER_PREVIEW   =", teacher[:260].replace("\n", " "))
                      print("STUDENT_PREVIEW   =", student[:260].replace("\n", " "))

          bench_dir.mkdir(parents=True, exist_ok=True)
          with (bench_dir / "benchmark_records.jsonl").open("w", encoding="utf-8") as f:
              for r in records:
                  f.write(json.dumps(r, ensure_ascii=False) + "\n")

          ranked = sorted(records, key=lambda x: x["token_f1"])
          weakest = ranked[:18]
          strongest = ranked[-10:]

          suite_rollup = []
          for suite_name, stats in suite_summary.items():
              mean_f1 = stats["f1_sum"] / max(stats["count"], 1)
              suite_rollup.append({
                  "suite": suite_name,
                  "n": stats["count"],
                  "mean_token_f1": round(mean_f1, 4),
                  "teacher_longer_frac": round(stats["teacher_longer"] / max(stats["count"], 1), 4),
                  "student_empty_frac": round(stats["student_empty"] / max(stats["count"], 1), 4),
              })

          suite_rollup = sorted(suite_rollup, key=lambda x: x["mean_token_f1"])

          public_reference = {
              "source_note": "Expected public gap reference for Qwen2.5 0.5B vs 1.5B family.",
              "mmlu_gap": 13.4,
              "gsm8k_gap": 26.9,
              "humaneval_gap": 6.7,
              "mbpp_gap": 20.9,
          }

          report = {
              "teacher_model": teacher_repo,
              "student_model": student_repo,
              "max_new_tokens": max_new_tokens,
              "num_total_cases": len(records),
              "suite_rollup": suite_rollup,
              "weakest_cases": weakest,
              "strongest_cases": strongest,
              "public_reference_gap": public_reference,
          }

          (summary_dir / "stage1_benchmark_report.json").write_text(
              json.dumps(report, indent=2), encoding="utf-8"
          )

          with (summary_dir / "stage1_benchmark_report.txt").open("w", encoding="utf-8") as f:
              f.write("=" * 80 + "\n")
              f.write("STAGE 1 BENCHMARK REPORT\n")
              f.write("=" * 80 + "\n")
              f.write(f"Teacher: {teacher_repo}\n")
              f.write(f"Student: {student_repo}\n")
              f.write(f"Total cases: {len(records)}\n\n")
              f.write("PUBLIC REFERENCE GAP (from Qwen published benchmarks)\n")
              for k, v in public_reference.items():
                  if k != "source_note":
                      f.write(f"  {k}: {v}\n")
              f.write("\nSUITE ROLLUP (lower mean_token_f1 = larger observed gap)\n")
              for row in suite_rollup:
                  f.write(json.dumps(row) + "\n")
              f.write("\nWEAKEST CASES\n")
              for row in weakest:
                  f.write(json.dumps({
                      "id": row["id"],
                      "suite": row["suite"],
                      "style": row["style"],
                      "token_f1": row["token_f1"],
                      "prompt": row["prompt"],
                  }, ensure_ascii=False) + "\n")

          print("\n" + "=" * 80)
          print("STAGE 1 COMPLETE")
          print("=" * 80)
          print("The benchmark report has been written to:")
          print(summary_dir / "stage1_benchmark_report.json")
          print(summary_dir / "stage1_benchmark_report.txt")
          print("\nSUITE ROLLUP:")
          for row in suite_rollup:
              print(row)
          print("\nTOP WEAK CASE IDS:")
          for row in weakest[:10]:
              print(row["id"], row["token_f1"], row["prompt"])
          PY

          python3 scripts/stage1_benchmark.py | tee "${SUMMARY_DIR}/stage1_benchmark_console.log"

      - name: Stage 1 - Show benchmark summary
        run: |
          set -euxo pipefail
          echo "================ STAGE 1 SUMMARY TXT ================"
          cat "${SUMMARY_DIR}/stage1_benchmark_report.txt"
          echo "====================================================="

      - name: Stage 2 - Build three ultra verbose DoRA distillation attempts
        run: |
          set -euxo pipefail
          mkdir -p scripts "${STRATEGY_ROOT}"

          cat > scripts/stage2_build_datasets.py <<'PY'
          import json
          import os
          import random
          import re
          from pathlib import Path

          from mlx_lm import load, generate

          random.seed(0)

          strategy_root = Path(os.environ["STRATEGY_ROOT"])
          bench_dir = Path(os.environ["BENCH_DIR"])
          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]
          max_new_tokens = int(os.environ.get("MAX_NEW_TOKENS", "220"))

          print("=" * 80)
          print("STAGE 2: BUILD DISTILLATION DATASETS")
          print("=" * 80)
          print("This stage creates multiple local/open-only distillation attempts.")
          print("Each attempt mimics a public high-level pattern:")
          print("  1) narrow capability-focused imitation")
          print("  2) bursty prompt-family variation")
          print("  3) adaptive weak-skill mining")
          print("It is intended to reveal what works and what is broken.")
          print("=" * 80)

          print("\n[LOAD] Teacher:", teacher_repo)
          teacher_model, teacher_tok = load(teacher_repo)

          print("[LOAD] Student:", student_repo)
          student_model, student_tok = load(student_repo)

          def promptify(tok, user_text: str, style: str = "direct") -> str:
              if style == "direct":
                  system = (
                      "You are a precise assistant. "
                      "Answer directly. "
                      "For code tasks, give code first, then a short explanation."
                  )
              elif style == "edge_case":
                  system = (
                      "You are a careful assistant. "
                      "Prefer robust answers that mention pitfalls, edge cases, or caveats where useful."
                  )
              elif style == "agentic":
                  system = (
                      "You are a task-solving assistant. "
                      "Provide a concise, executable answer that would help a coding or operations workflow."
                  )
              else:
                  system = "You are a helpful assistant."

              msgs = [
                  {"role": "system", "content": system},
                  {"role": "user", "content": user_text},
              ]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          def answer(model, tok, user_text: str, style: str = "direct") -> str:
              return generate(
                  model,
                  tok,
                  prompt=promptify(tok, user_text, style),
                  max_tokens=max_new_tokens,
                  verbose=False,
              ).strip()

          def norm_tokens(s: str):
              return re.findall(r"[a-zA-Z0-9_]+", s.lower())

          def token_f1(a: str, b: str) -> float:
              aa = norm_tokens(a)
              bb = norm_tokens(b)
              if not aa or not bb:
                  return 0.0
              ca = {}
              cb = {}
              for t in aa:
                  ca[t] = ca.get(t, 0) + 1
              for t in bb:
                  cb[t] = cb.get(t, 0) + 1
              overlap = 0
              for t, c in ca.items():
                  overlap += min(c, cb.get(t, 0))
              if overlap == 0:
                  return 0.0
              precision = overlap / max(len(bb), 1)
              recall = overlap / max(len(aa), 1)
              return 2 * precision * recall / max(precision + recall, 1e-9)

          def teacher_completion(prompt: str, style: str) -> str:
              return answer(teacher_model, teacher_tok, prompt, style)

          def student_completion(prompt: str, style: str) -> str:
              return answer(student_model, student_tok, prompt, style)

          def ask_teacher_for_variants(base_prompt: str, teacher_answer_text: str, variant_mode: str):
              if variant_mode == "burst":
                  instruction = (
                      "Create exactly 4 prompts that keep the same core skill but vary framing, "
                      "constraints, and format. One should be terse, one edge-case heavy, one "
                      "production-oriented, and one structured-output oriented."
                  )
              else:
                  instruction = (
                      "Create exactly 4 harder prompts that keep the same core skill but increase "
                      "failure risk through edge cases, constraints, ambiguity reduction, or realism."
                  )

              variant_request = f"""
          You are generating benchmark prompts for a smaller student model.

          Original prompt:
          {base_prompt}

          Teacher answer summary:
          {teacher_answer_text[:700]}

          {instruction}
          Return ONLY a numbered list.
              """.strip()

              raw = teacher_completion(variant_request, "direct")
              lines = [x.strip() for x in raw.splitlines() if x.strip()]
              variants = []
              for line in lines:
                  line = re.sub(r"^\d+[\).\s-]+", "", line).strip()
                  if line:
                      variants.append(line)

              out = []
              seen = set()
              for v in variants:
                  if v not in seen:
                      seen.add(v)
                      out.append(v)
                  if len(out) == 4:
                      break

              if len(out) < 4:
                  out.extend([
                      base_prompt + " Include edge cases and tests.",
                      base_prompt + " Add one realistic production caveat.",
                      base_prompt + " Return the answer in JSON if appropriate.",
                      base_prompt + " Keep the answer concise but robust.",
                  ])
                  out = out[:4]

              return out

          report = json.loads((Path(os.environ["SUMMARY_DIR"]) / "stage1_benchmark_report.json").read_text(encoding="utf-8"))
          weakest_cases = report["weakest_cases"]
          strongest_cases = report["strongest_cases"]

          seeds_direct = [r["prompt"] for r in weakest_cases[:10]]
          seeds_burst = [r["prompt"] for r in weakest_cases[4:14]]
          seeds_adaptive = [r["prompt"] for r in weakest_cases[:12]]

          strategies = {
              "attempt_a_direct_imitation": {
                  "description": "Train on weak prompts directly, one teacher completion per prompt.",
                  "records": [],
              },
              "attempt_b_bursty_prompt_families": {
                  "description": "Expand weak prompts into bursty prompt families with framing variation.",
                  "records": [],
              },
              "attempt_c_adaptive_weak_skill_mining": {
                  "description": "Mine harder prompts adaptively where student differs most from teacher.",
                  "records": [],
              },
          }

          print("\n[STRATEGY A] direct imitation")
          for prompt in seeds_direct:
              t = teacher_completion(prompt, "direct")
              s = student_completion(prompt, "direct")
              f1 = token_f1(t, s)
              strategies["attempt_a_direct_imitation"]["records"].append({
                  "prompt": prompt,
                  "completion": t,
                  "meta": {
                      "style": "direct",
                      "source": "weak_seed",
                      "student_teacher_token_f1": round(f1, 4),
                  },
              })
              print("  ADDED:", round(f1, 4), prompt)

          print("\n[STRATEGY B] bursty prompt families")
          for prompt in seeds_burst:
              t0 = teacher_completion(prompt, "direct")
              variants = ask_teacher_for_variants(prompt, t0, "burst")

              # keep the seed
              s0 = student_completion(prompt, "direct")
              f10 = token_f1(t0, s0)
              strategies["attempt_b_bursty_prompt_families"]["records"].append({
                  "prompt": prompt,
                  "completion": t0,
                  "meta": {
                      "style": "direct",
                      "source": "burst_seed",
                      "student_teacher_token_f1": round(f10, 4),
                  },
              })
              print("  SEED:", round(f10, 4), prompt)

              for i, hp in enumerate(variants):
                  style = ["direct", "edge_case", "agentic", "edge_case"][i % 4]
                  ht = teacher_completion(hp, style)
                  hs = student_completion(hp, style)
                  hf = token_f1(ht, hs)
                  strategies["attempt_b_bursty_prompt_families"]["records"].append({
                      "prompt": hp,
                      "completion": ht,
                      "meta": {
                          "style": style,
                          "source": "burst_variant",
                          "parent_prompt": prompt,
                          "student_teacher_token_f1": round(hf, 4),
                      },
                  })
                  print("  VARIANT:", style, round(hf, 4), hp)

          print("\n[STRATEGY C] adaptive weak-skill mining")
          for prompt in seeds_adaptive:
              t0 = teacher_completion(prompt, "edge_case")
              s0 = student_completion(prompt, "edge_case")
              f10 = token_f1(t0, s0)

              if f10 > 0.65:
                  print("  SKIP HIGH-AGREEMENT:", round(f10, 4), prompt)
                  continue

              variants = ask_teacher_for_variants(prompt, t0, "adaptive")
              for hp in variants:
                  for style in ("direct", "edge_case"):
                      ht = teacher_completion(hp, style)
                      hs = student_completion(hp, style)
                      hf = token_f1(ht, hs)
                      strategies["attempt_c_adaptive_weak_skill_mining"]["records"].append({
                          "prompt": hp,
                          "completion": ht,
                          "meta": {
                              "style": style,
                              "source": "adaptive_variant",
                              "parent_prompt": prompt,
                              "student_teacher_token_f1": round(hf, 4),
                          },
                      })
                      print("  ADAPTIVE:", style, round(hf, 4), hp)

          heldout_prompts = [r["prompt"] for r in strongest_cases[:6]] + [r["prompt"] for r in weakest_cases[10:16]]

          def dedup_records(records):
              out = {}
              for r in records:
                  out[(r["prompt"], r["meta"]["style"])] = r
              return list(out.values())

          def write_jsonl(path: Path, items):
              with path.open("w", encoding="utf-8") as f:
                  for item in items:
                      f.write(json.dumps({
                          "prompt": item["prompt"],
                          "completion": item["completion"],
                      }, ensure_ascii=False) + "\n")

          for name, payload in strategies.items():
              strategy_dir = strategy_root / name
              strategy_dir.mkdir(parents=True, exist_ok=True)

              records = dedup_records(payload["records"])
              random.shuffle(records)

              heldout = []
              train_pool = []

              heldout_set = set(heldout_prompts)
              for r in records:
                  if r["prompt"] in heldout_set and len(heldout) < 8:
                      heldout.append(r)
                  else:
                      train_pool.append(r)

              n = len(train_pool)
              n_train = max(int(n * 0.85), 1)
              train = train_pool[:n_train]
              valid = train_pool[n_train:]

              if not valid:
                  valid = train[-2:] if len(train) >= 2 else train[:]

              test = heldout if heldout else valid[-4:] if len(valid) >= 4 else train[-4:]

              write_jsonl(strategy_dir / "train.jsonl", train)
              write_jsonl(strategy_dir / "valid.jsonl", valid)
              write_jsonl(strategy_dir / "test.jsonl", test)

              manifest = {
                  "strategy": name,
                  "description": payload["description"],
                  "num_total_records": len(records),
                  "num_train": len(train),
                  "num_valid": len(valid),
                  "num_test": len(test),
                  "train_preview_prompts": [x["prompt"] for x in train[:5]],
                  "test_preview_prompts": [x["prompt"] for x in test[:5]],
                }
              (strategy_dir / "manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")

              print("\n" + "-" * 80)
              print("WROTE STRATEGY:", name)
              print(json.dumps(manifest, indent=2))
              print("-" * 80)
          PY

          python3 scripts/stage2_build_datasets.py | tee "${SUMMARY_DIR}/stage2_dataset_build_console.log"

      - name: Stage 2 - Show strategy manifests
        run: |
          set -euxo pipefail
          for d in "${STRATEGY_ROOT}"/*; do
            echo "================ MANIFEST: ${d} ================"
            cat "${d}/manifest.json"
            echo
            echo "TRAIN LINES: $(wc -l < "${d}/train.jsonl")"
            echo "VALID LINES: $(wc -l < "${d}/valid.jsonl")"
            echo "TEST  LINES: $(wc -l < "${d}/test.jsonl")"
            echo "================================================"
          done

      - name: Stage 2 - Run DoRA distillation attempts and collect results
        run: |
          set -euxo pipefail
          mkdir -p scripts

          cat > scripts/run_dora_attempts.sh <<'SH'
          set -euxo pipefail

          STUDENT_MODEL="${STUDENT_MODEL}"
          STRATEGY_ROOT="${STRATEGY_ROOT}"
          SUMMARY_DIR="${SUMMARY_DIR}"

          : > "${SUMMARY_DIR}/attempt_results.tsv"
          printf "strategy\tbaseline_test_phase\tbaseline_value\tadapted_test_phase\tadapted_value\tstatus\n" >> "${SUMMARY_DIR}/attempt_results.tsv"

          for strategy_dir in "${STRATEGY_ROOT}"/*; do
            strategy_name="$(basename "${strategy_dir}")"
            adapter_dir="${strategy_dir}/adapter_dora"
            mkdir -p "${adapter_dir}"

            echo "########################################################################"
            echo "RUNNING STRATEGY: ${strategy_name}"
            echo "########################################################################"

            echo "[1/4] Baseline test before DoRA"
            python3 -m mlx_lm.lora \
              --model "${STUDENT_MODEL}" \
              --data "${strategy_dir}" \
              --test | tee "${strategy_dir}/baseline_test.log"

            echo "[2/4] DoRA training"
            python3 -m mlx_lm.lora \
              --model "${STUDENT_MODEL}" \
              --train \
              --data "${strategy_dir}" \
              --adapter-path "${adapter_dir}" \
              --fine-tune-type dora \
              --iters 160 \
              --batch-size 1 \
              --num-layers 8 \
              --learning-rate 1e-5 \
              --mask-prompt | tee "${strategy_dir}/train_dora.log"

            echo "[3/4] Adapted test after DoRA"
            python3 -m mlx_lm.lora \
              --model "${STUDENT_MODEL}" \
              --adapter-path "${adapter_dir}" \
              --data "${strategy_dir}" \
              --test | tee "${strategy_dir}/adapted_test.log"

            echo "[4/4] Extract metrics and finalize"
            python3 - "${strategy_dir}" "${strategy_name}" "${SUMMARY_DIR}/attempt_results.tsv" <<'PY'
          import sys
          import re
          from pathlib import Path

          strategy_dir = Path(sys.argv[1])
          strategy_name = sys.argv[2]
          out_tsv = Path(sys.argv[3])

          def extract_metric(log_path: Path):
              if not log_path.exists():
                  return "N/A"
              txt = log_path.read_text(encoding="utf-8", errors="ignore")
              # Captures MLX test outputs like "test loss 2.45" or "test perplexity 11.5"
              matches = re.findall(r"(?:loss|ppl|perplexity)[\s:]+([\d.]+)", txt.lower())
              return matches[-1] if matches else "N/A"

          baseline_val = extract_metric(strategy_dir / "baseline_test.log")
          adapted_val = extract_metric(strategy_dir / "adapted_test.log")

          with open(out_tsv, "a", encoding="utf-8") as f:
              f.write(f"{strategy_name}\ttest\t{baseline_val}\ttest\t{adapted_val}\tsuccess\n")
          PY

          done
          SH

          bash scripts/run_dora_attempts.sh
