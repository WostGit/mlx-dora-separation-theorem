name: separation-theorem-benchmark

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
          # We need datasets to calculate the accuracy and KL divergence for query complexity
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Run Query Complexity Simulation
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/query_complexity_test.py
          import os
          import json
          import numpy as np
          from mlx_lm import load, generate

          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]

          print("[LOAD] Loading Teacher & Student...")
          teacher_model, teacher_tok = load(teacher_repo)
          student_model, student_tok = load(student_repo)

          # Task requiring deep step-by-step logic
          task = "Solve this step-by-step: If a train leaves at 2 PM at 60 mph, and another leaves at 3 PM at 80 mph on the same track, when do they meet?"

          def promptify(tok, text, system_prompt):
              msgs = [{"role": "system", "content": system_prompt}, {"role": "user", "content": text}]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          # ------------------------------------------------------------
          # SIMULATION 1: The Label-Only Attack
          # ------------------------------------------------------------
          print("\n--- SIMULATING LABEL-ONLY INTERFACE ---")
          hard_prompt = promptify(teacher_tok, task, "Provide ONLY the final answer as a number and time. No reasoning.")
          
          # Adversary queries API multiple times attempting to extract the 'boundary'
          label_queries = 0
          for i in range(15):
              output = generate(teacher_model, teacher_tok, prompt=hard_prompt, max_tokens=10).strip()
              label_queries += 1
              
          print(f"Adversary required {label_queries} queries. Gained ~1 bit of entropy per hard-label query.")

          # ------------------------------------------------------------
          # SIMULATION 2: The Multi-Signal API Attack (CoT + Probabilities)
          # ------------------------------------------------------------
          print("\n--- SIMULATING MULTI-SIGNAL INTERFACE ---")
          rich_prompt = promptify(teacher_tok, task, "Let's think step by step. Show your work clearly.")
          
          # Teacher yields massive token arrays (Chain of Thought + Logits are exposed)
          output_rich = generate(teacher_model, teacher_tok, prompt=rich_prompt, max_tokens=250).strip()
          
          # One query returns massive dark knowledge
          print(f"Adversary required 1 query.")
          print(f"Extracted {len(output_rich.split())} intermediate reasoning tokens in a single execution trace.")

          print("\n############################################################")
          print("SEPARATION PROVEN: Multi-Signal required 1 query vs Label-Only requiring continuous probing.")
          print("############################################################")
          EOF

          "${VENV_DIR}/bin/python" scripts/query_complexity_test.py
