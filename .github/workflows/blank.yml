name: dora-separation-theorem-correct

on:
workflow_dispatch:

jobs:
run:
runs-on: macos-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Install deps
    run: |
      pip install mlx mlx_lm

  - name: Run TRUE distillation experiment
    run: |
      python - <<'PY'
      import mlx.core as mx
      from mlx_lm import load

      print("\n==============================")
      print("STEP 1: LOAD MODEL")
      print("==============================")

      model, tokenizer = load("Qwen/Qwen2-0.5B")

      def get_probs(prompt):
          ids = tokenizer.encode(prompt)
          x = mx.array([ids], dtype=mx.int32)
          logits = model(x)[0, -1, :]
          probs = mx.softmax(logits).astype(mx.float32)
          return probs

      prompts = [
          "Fix bug: def add(a,b): return a-b",
          "Reverse string in Python",
          "Multiply two numbers function",
          "Fix division by zero",
          "Sort a list ascending",
      ]

      vocab_size = get_probs(prompts[0]).shape[0]

      print("\n==============================")
      print("STEP 2: BUILD TRUE DATASET")
      print("==============================")

      dataset = []

      for p in prompts:
          v = get_probs(p)

          argmax_target = mx.zeros_like(v)
          argmax_target[int(mx.argmax(v).item())] = 1.0

          k = 5
          topk_ids = mx.argsort(v)[-k:]
          topk_target = mx.zeros_like(v)
          topk_vals = v[topk_ids]
          topk_vals = topk_vals / mx.sum(topk_vals)
          topk_target[topk_ids] = topk_vals

          probs_target = v

          dataset.append((p, argmax_target, topk_target, probs_target))

      print("Dataset built with REAL probability targets")

      print("\n==============================")
      print("STEP 3: DEFINE STUDENTS")
      print("==============================")

      class Student:
          def __init__(self):
              self.logits = mx.zeros(vocab_size)

          def probs(self):
              return mx.softmax(self.logits)

          def update(self, grad, lr=0.5):
              self.logits = self.logits - lr * grad

      def kl_grad(student_probs, target_probs):
          return student_probs - target_probs

      students = {
          "argmax": Student(),
          "topk": Student(),
          "probs": Student(),
      }

      print("\n==============================")
      print("STEP 4: TRAIN (REAL KL DISTILLATION)")
      print("==============================")

      epochs = 200

      for epoch in range(epochs):
          for prompt, a_t, t_t, p_t in dataset:
              for name, student in students.items():
                  sp = student.probs()

                  if name == "argmax":
                      target = a_t
                  elif name == "topk":
                      target = t_t
                  else:
                      target = p_t

                  grad = kl_grad(sp, target)
                  student.update(grad)

      print("Training complete")

      print("\n==============================")
      print("STEP 5: EVALUATION")
      print("==============================")

      def kl(p, q):
          return float(mx.sum(p * mx.log(p / q)).item())

      for name, student in students.items():
          agreements = []
          kls = []

          for prompt, a_t, t_t, p_t in dataset:
              v = p_t
              s = student.probs()

              vt = int(mx.argmax(v).item())
              st = int(mx.argmax(s).item())

              agreements.append(int(vt == st))
              kls.append(kl(v, s))

          print(f"\nSTUDENT = {name}")
          print("MEAN AGREEMENT =", sum(agreements)/len(agreements))
          print("MEAN KL =", sum(kls)/len(kls))

      print("\nEXPECTED THEOREM:")
      print("KL: probs < topk < argmax")
      print("Agreement: all can be high")

      PY
```
