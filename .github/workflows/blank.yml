name: dora-benchmark-cot-verbose

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache

      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit

      DATA_ROOT: ${{ github.workspace }}/distill_runs
      BENCH_DIR: ${{ github.workspace }}/distill_runs/bench
      STRATEGY_ROOT: ${{ github.workspace }}/distill_runs/strategies

      # Increased token allowance to let the teacher dump its full CoT
      BENCH_MAX_NEW_TOKENS: "250" 
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" numpy

      - name: Stage 1 - Generate Teacher Chain-of-Thought Data
        run: |
          set -euxo pipefail
          mkdir -p scripts "${BENCH_DIR}"

          cat > scripts/stage1_benchmark.py <<'PY'
          import json
          import os
          from pathlib import Path
          from mlx_lm import load, generate

          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]
          max_new_tokens = int(os.environ.get("BENCH_MAX_NEW_TOKENS", "250"))

          print("\n[LOAD] Teacher:", teacher_repo)
          teacher_model, teacher_tok = load(teacher_repo)

          print("[LOAD] Student:", student_repo)
          student_model, student_tok = load(student_repo)

          def promptify(tok, user_text: str, enforce_cot: bool = False) -> str:
              system_prompt = "You are a precise assistant. Answer directly."
              if enforce_cot:
                  system_prompt = "You are a brilliant reasoning assistant. You MUST first provide your detailed step-by-step thinking process wrapped inside <thought> tags, and then state your final answer."
              
              msgs = [{"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_text}]
              return tok.apply_chat_template(msgs, tokenize=False, add_generation_prompt=True)

          suites = {
              "reasoning_math": ["If 5 workers finish a job in 12 days, how many days for 8 workers?"],
              "coding_logic": ["Write a safe divide(a,b) function in Python handling zero."]
          }

          records = []
          for suite_name, prompts in suites.items():
              for prompt in prompts:
                  print(f"\nPrompting: {prompt}")
                  
                  print("\n>>> TEACHER GENERATION (With CoT Enforcement):")
                  # The teacher now outputs the internal strategy it uses
                  teacher_ans = generate(teacher_model, teacher_tok, prompt=promptify(teacher_tok, prompt, enforce_cot=True), 
                                         max_tokens=max_new_tokens, verbose=True).strip()
                  
                  print("\n>>> STUDENT BASELINE GENERATION:")
                  student_ans = generate(student_model, student_tok, prompt=promptify(student_tok, prompt, enforce_cot=False), 
                                         max_tokens=max_new_tokens, verbose=True).strip()

                  records.append({"prompt": prompt, "completion": teacher_ans})

          bench_dir = Path(os.environ["BENCH_DIR"])
          bench_dir.mkdir(parents=True, exist_ok=True)
          with (bench_dir / "minimal_train.jsonl").open("w") as f:
              for r in records:
                  f.write(json.dumps(r) + "\n")
          PY

          "${VENV_DIR}/bin/python" scripts/stage1_benchmark.py

      - name: Stage 2 - Train Student on Reasoning Paths
        run: |
          set -euxo pipefail
          export PATH="${VENV_DIR}/bin:$PATH"

          mkdir -p "${STRATEGY_ROOT}/dora_run"
          
          python -c "
          import json, os
          with open('$BENCH_DIR/minimal_train.jsonl') as f:
              lines = [line.strip() for line in f if line.strip()]
          padded = lines * 8
          for filename in ['train.jsonl', 'valid.jsonl', 'test.jsonl']:
              with open(f'$STRATEGY_ROOT/dora_run/{filename}', 'w') as out:
                  out.write('\n'.join(padded) + '\n')
          "

          echo "########################################################################"
          echo "DORA ADAPTATION TRAINING ON COT"
          echo "########################################################################"
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --train \
            --data "${STRATEGY_ROOT}/dora_run" \
            --adapter-path "${STRATEGY_ROOT}/dora_run/adapters" \
            --fine-tune-type dora \
            --iters 40 \
            --batch-size 1 \
            --num-layers 4 \
            --learning-rate 1e-5 \
            --mask-prompt

          echo "########################################################################"
          echo "POST-DISTILLATION EVALUATION"
          echo "########################################################################"
          mlx_lm.lora \
            --model "${STUDENT_MODEL}" \
            --adapter-path "${STRATEGY_ROOT}/dora_run/adapters" \
            --data "${STRATEGY_ROOT}/dora_run" \
            --batch-size 1 \
            --test
